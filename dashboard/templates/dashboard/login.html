<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Admin Login — MCKBytes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#C8102E; --brand-2:#ff3b5c;
  --ink:#0b0b10; --ink-2:#1a1b22; --ink-3:#3a3b45; --muted:#6b6c78;
  --line:#e8e9ee; --paper:#ffffff; --paper-2:#f7f7fa; --paper-3:#eef0f4;
  --ease:cubic-bezier(.22,.61,.36,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:"Sora",system-ui,sans-serif;
  background:var(--paper-2);color:var(--ink);min-height:100vh;
  -webkit-font-smoothing:antialiased;
  display:grid;place-items:center;padding:24px;
  position:relative;overflow:hidden;
}
body::before{
  content:"";position:absolute;inset:0;z-index:0;
  background:
    radial-gradient(700px 480px at 90% 0%,rgba(200,16,46,.12),transparent 60%),
    radial-gradient(600px 400px at 0% 100%,rgba(10,132,255,.10),transparent 60%);
}
body::after{
  content:"";position:absolute;inset:0;z-index:0;
  background-image:
    linear-gradient(to right, rgba(15,17,26,.04) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(15,17,26,.04) 1px, transparent 1px);
  background-size:48px 48px;
  mask-image:radial-gradient(ellipse at 50% 50%,#000 30%,transparent 75%);
}

.shell{
  position:relative;z-index:1;
  width:100%;max-width:440px;
}

.brand{
  display:flex;align-items:center;justify-content:center;gap:10px;
  margin-bottom:32px;
  font-family:"Sora";font-weight:800;font-size:1.4rem;
  letter-spacing:-.02em;
}
.brand__mark{
  width:42px;height:42px;border-radius:12px;
  background:linear-gradient(135deg,var(--ink),#2a2b35 60%,var(--brand) 140%);
  display:grid;place-items:center;color:#fff;font-weight:800;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.08),0 8px 18px rgba(200,16,46,.28);
}
.brand b{color:var(--brand)}

.login-card{
  background:var(--paper);
  border:1px solid var(--line);
  border-radius:18px;
  padding:36px 32px;
  box-shadow:0 30px 70px -20px rgba(15,17,26,.18),0 4px 16px rgba(15,17,26,.04);
  position:relative;overflow:hidden;
}
.login-card::before{
  content:"";position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--brand),var(--brand-2),var(--brand));
}
.login-card__chip{
  display:inline-flex;align-items:center;gap:7px;
  padding:5px 11px;border-radius:999px;
  background:rgba(200,16,46,.08);
  border:1px solid rgba(200,16,46,.2);
  color:var(--brand);
  font-family:"JetBrains Mono",monospace;font-size:.66rem;
  letter-spacing:.14em;text-transform:uppercase;font-weight:600;
  margin-bottom:16px;
}
.login-card__chip::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--brand);box-shadow:0 0 0 3px rgba(200,16,46,.18)}

.login-card h1{
  font-family:"Sora";font-weight:800;font-size:1.6rem;
  letter-spacing:-.02em;margin-bottom:6px;
}
.login-card__sub{
  color:var(--muted);font-size:.92rem;margin-bottom:26px;
}

.msgs{margin-bottom:18px;display:flex;flex-direction:column;gap:8px}
.msg{
  padding:11px 14px;border-radius:9px;
  font-size:.86rem;font-weight:500;
  display:flex;align-items:center;gap:8px;
  border:1px solid;
}
.msg svg{width:14px;height:14px;flex-shrink:0}
.msg.success{background:rgba(48,209,88,.08);border-color:rgba(48,209,88,.3);color:#0a7a3a}
.msg.error{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.3);color:#a82020}

.fg{margin-bottom:16px}
.fg label{
  display:block;font-size:.74rem;font-weight:600;
  letter-spacing:.08em;text-transform:uppercase;
  color:var(--ink-2);margin-bottom:8px;
  font-family:"JetBrains Mono",monospace;
}
.fg__field{position:relative}
.fg__field svg{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  width:16px;height:16px;color:var(--muted);pointer-events:none;
}
.fg input{
  width:100%;padding:.78rem 1rem .78rem 42px;
  border:1.5px solid var(--line);
  border-radius:10px;background:var(--paper-2);
  font-family:"Sora";font-size:.95rem;color:var(--ink);
  outline:none;transition:border-color .2s,box-shadow .2s,background .2s;
}
.fg input:focus{
  border-color:var(--brand);background:var(--paper);
  box-shadow:0 0 0 3px rgba(200,16,46,.12);
}
.fg input::placeholder{color:var(--muted)}

.submit{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:.85rem 1rem;
  background:linear-gradient(135deg,var(--brand),#a8001f);
  color:#fff;border:0;border-radius:10px;
  font-family:"Sora";font-weight:700;font-size:.94rem;letter-spacing:.01em;
  cursor:pointer;
  box-shadow:0 8px 22px -4px rgba(200,16,46,.4),inset 0 1px 0 rgba(255,255,255,.12);
  transition:transform .2s,box-shadow .2s;
  position:relative;overflow:hidden;
}
.submit::before{
  content:"";position:absolute;inset:0;
  background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,.22) 50%,transparent 70%);
  transform:translateX(-100%);transition:transform .7s var(--ease);
}
.submit:hover::before{transform:translateX(100%)}
.submit:hover{transform:translateY(-1px);box-shadow:0 14px 30px -4px rgba(200,16,46,.5)}
.submit svg{width:14px;height:14px}

.foot{
  text-align:center;font-size:.82rem;color:var(--muted);
  margin-top:24px;
}
.foot a{color:var(--ink-2);font-weight:600;transition:color .2s}
.foot a:hover{color:var(--brand)}
</style>
</head>
<body>

<div class="shell">

  <div class="brand">
    <span class="brand__mark">M</span>
    <span>MCK<b>Bytes</b></span>
  </div>

  <div class="login-card">
    <span class="login-card__chip">Secure Login</span>
    <h1>Welcome back.</h1>
    <p class="login-card__sub">Sign in to access the MCKBytes admin dashboard.</p>

    {% if messages %}
      <div class="msgs">
        {% for m in messages %}
          <div class="msg {{ m.tags }}">
            {% if m.tags == 'success' %}
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M20 6L9 17l-5-5"/></svg>
            {% else %}
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16v.01"/></svg>
            {% endif %}
            {{ m }}
          </div>
        {% endfor %}
      </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="fg">
        <label>Username</label>
        <div class="fg__field">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input type="text" name="username" placeholder="admin" required autofocus>
        </div>
      </div>
      <div class="fg">
        <label>Password</label>
        <div class="fg__field">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" name="password" placeholder="••••••••" required>
        </div>
      </div>
      <button type="submit" class="submit">
        Sign in
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </form>
  </div>

  <p class="foot">
    Need help? <a href="mailto:info@mckbytes.com">Contact support</a>
  </p>
</div>

</body>
</html>
