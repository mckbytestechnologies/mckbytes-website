<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>B2B Lead Generation Companies In Vellore</title>

  <!-- Main CSS -->
  <link rel="stylesheet" href="/css/style.css">

  <style>

    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#fff;
      color:#111;
    }

    .page-hero{
      padding:120px 20px 80px;
      text-align:center;
      background:#f5f7fb;
    }

    .page-hero h1{
      font-size:48px;
      margin-bottom:20px;
    }

    .page-hero p{
      max-width:800px;
      margin:auto;
      line-height:1.7;
      color:#666;
    }

    .content{
      max-width:1200px;
      margin:auto;
      padding:80px 20px;
    }

  </style>

</head>

<body>

  <!-- ================= HEADER ================= -->
  <div id="header"></div>


  <!-- ================= PAGE CONTENT ================= -->

  <section class="page-hero">

    <h1>B2B Marketing  Companies In Vellore</h1>

    <p>
      Grow your business with advanced lead generation,
      marketing automation, SEO, and digital outreach solutions.
    </p>

  </section>


  <section class="content">

    <h2>About Our Services</h2>

    <p>
      We help startups, enterprises, and growing brands generate
      high-quality B2B leads through performance-driven marketing.
    </p>

  </section>


  <!-- ================= FOOTER ================= -->
  <div id="footer"></div>



  <!-- ================= INCLUDE SCRIPT ================= -->

  <script>

    // HEADER LOAD
    fetch('/include/header.html')
      .then(response => response.text())
      .then(data => {

        document.getElementById('header').innerHTML = data;

        initHeader();

      });


    // FOOTER LOAD
    fetch('/include/footer.html')
      .then(response => response.text())
      .then(data => {

        document.getElementById('footer').innerHTML = data;

      });




    // HEADER FUNCTIONS
    function initHeader(){

      // Sticky Navbar
      const nav = document.getElementById('nav');

      if(nav){

        const onScroll = () => {
          nav.classList.toggle('nav--scrolled', window.scrollY > 10);
        };

        window.addEventListener('scroll', onScroll);

        onScroll();

      }



      // MOBILE MENU
      const menuBtn = document.getElementById('menuBtn');
      const drawer = document.getElementById('drawer');
      const drawerClose = document.getElementById('drawerClose');

      if(menuBtn && drawer){

        menuBtn.addEventListener('click', () => {
          drawer.classList.add('open');
        });

      }

      if(drawerClose && drawer){

        drawerClose.addEventListener('click', () => {
          drawer.classList.remove('open');
        });

      }



      // DROPDOWNS
      const navItems = document.querySelectorAll('.nav__item--has-menu');

      navItems.forEach(item => {

        const trigger = item.querySelector('.nav__link');
        const panel = item.querySelector('.nav__panel');

        if(!trigger || !panel) return;

        trigger.addEventListener('click', (e) => {

          e.preventDefault();

          panel.classList.toggle('open');

        });

      });

    }

  </script>

</body>
</html>
